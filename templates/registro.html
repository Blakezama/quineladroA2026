{% extends "base.html" %}

{% block title %}Crear Cuenta - Quiniela Mundial{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h1>Crear Cuenta</h1>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Únete a la quiniela y demuestra tus conocimientos de fútbol.
    </p>

    <form action="{{ url_for('registro') }}" method="POST">
        <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
        </div>

        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Mínimo 4 caracteres" required minlength="4">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Registrarme</button>
    </form>

    <p style="margin-top: 2rem; text-align: center; color: var(--text-dim);">
        ¿Ya tienes cuenta? <a href="{{ url_for('login') }}" style="color: var(--accent-color);">Inicia sesión aquí</a>
    </p>
</div>
{% endblock %}
