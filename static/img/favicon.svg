<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Degradado radial para darle volumen y realismo 3D, con un leve tono cyan en la sombra -->
    <radialGradient id="ballGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#b0c4de"/>
    </radialGradient>
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="46"/>
    </clipPath>
  </defs>

  <!-- Sombra base del balón -->
  <ellipse cx="50" cy="95" rx="25" ry="5" fill="rgba(0,0,0,0.2)"/>

  <!-- Cuerpo del balón (fondo blanco 3D) -->
  <circle cx="50" cy="50" r="46" fill="url(#ballGrad)"/>

  <!-- Patrón clásico de pentágonos, usando tu Pantone corporativo oscuro en lugar de negro puro -->
  <g clip-path="url(#circle-clip)" fill="#004D71" stroke="#00829B" stroke-width="1.2" stroke-linejoin="round">
    <!-- Pentágono central -->
    <polygon points="50,22  64,32  58,48  42,48  36,32" />
    
    <!-- Pentágono superior izquierdo -->
    <polygon points="20,16  28,6  14,0  2,8  10,20" />
    
    <!-- Pentágono superior derecho -->
    <polygon points="80,16  90,20  98,8  86,0  72,6" />

    <!-- Pentágono inferior izquierdo -->
    <polygon points="22,55  35,62  31,77  16,81  10,66" />
    
    <!-- Pentágono inferior derecho -->
    <polygon points="78,55  90,66  84,81  69,77  65,62" />

    <!-- Pentágono inferior central -->
    <polygon points="50,88  63,94  56,106  44,106  37,94" />
  </g>

  <!-- Líneas que conectan los pentágonos (bordes de los hexágonos) -->
  <g clip-path="url(#circle-clip)" stroke="#004D71" stroke-width="1.5" stroke-linecap="round">
    <line x1="36" y1="32" x2="20" y2="16" />
    <line x1="64" y1="32" x2="80" y2="16" />
    <line x1="42" y1="48" x2="35" y2="62" />
    <line x1="58" y1="48" x2="65" y2="62" />
    <line x1="50" y1="22" x2="50" y2="0" />
    <line x1="31" y1="77" x2="37" y2="94" />
    <line x1="69" y1="77" x2="63" y2="94" />
  </g>

  <!-- Brillos curvos para realzar el efecto de esfera pulida -->
  <ellipse cx="36" cy="30" rx="14" ry="9" fill="white" opacity="0.6" transform="rotate(-30 36 30)"/>
  <ellipse cx="32" cy="25" rx="5" ry="3" fill="white" opacity="0.8" transform="rotate(-30 32 25)"/>

  <!-- Borde exterior del balón -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#004D71" stroke-width="2"/>
</svg>
